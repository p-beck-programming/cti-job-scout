# Companies tracked by the job scout.
#
# Tailored from the postings you shared (Anthropic, OpenAI, 10a Labs, TENEX,
# Amazon ACTI, Bank of America threat hunting, EY/Deloitte, Computershare):
# the pattern is AI-lab threat intelligence, MDR/detection vendors, threat
# intel firms, and big-tech/fintech CTI teams. This list keeps companies in
# those same buckets that hire CTI/DE/TH roles regularly AND run public
# Greenhouse or Lever boards, which is what this agent can poll.
#
# NOT included, and why:
#   - Amazon, Microsoft, Google, EY, Deloitte, Bank of America, Computershare
#     use proprietary or Workday-style ATSes with no public Greenhouse/Lever/
#     Ashby board. Track those manually or add a fetcher later.
#   - CrowdStrike, Palo Alto Networks, Proofpoint: Workday / SmartRecruiters,
#     same limitation.
#   - Arctic Wolf: moved to Workday (careers page embeds myworkdayjobs.com),
#     same limitation. Removed 2026-07.
#
# IMPORTANT — review and validate this list before first run:
# board tokens change when companies switch ATS vendors. Run:
#     python scripts/validate_companies.py
# It hits each board and tells you which entries are live. Fix or delete
# anything it flags. Adding a company = find its careers page URL; if it
# looks like boards.greenhouse.io/<token>, jobs.lever.co/<token>, or
# jobs.ashbyhq.com/<token>, that final path segment is the token.

companies:
  # --- AI labs / AI safety (matches your Anthropic, OpenAI, 10a Labs interest)
  - name: Anthropic
    ats: greenhouse
    token: anthropic
  - name: OpenAI
    ats: ashby         # moved off Greenhouse; Ashby board verified 2026-07
    token: openai
  - name: Scale AI
    ats: greenhouse
    token: scaleai

  # --- MDR / detection / hunting vendors (matches TENEX-style roles)
  # Red Canary was acquired by Zscaler; its roles now post on Zscaler's
  # Greenhouse board (their old zscalerredcanary board is dead). The
  # prefilter strips Zscaler's non-security bulk before any LLM call.
  - name: Zscaler (Red Canary)
    ats: greenhouse
    token: zscaler
  - name: Expel
    ats: greenhouse
    token: expel
  - name: Huntress
    ats: greenhouse
    token: huntress

  # --- Threat intelligence / threat research firms
  - name: Dragos
    ats: greenhouse
    token: dragos
  - name: GreyNoise
    ats: greenhouse
    token: greynoiseintelligence   # board renamed; verified 2026-07
  - name: Flashpoint
    ats: ashby         # moved off Greenhouse; note the dotted board name
    token: flashpoint.io
  - name: Recorded Future
    ats: greenhouse
    token: recordedfuture

  # --- Security product companies with strong detection/research teams
  - name: Elastic
    ats: greenhouse
    token: elastic
  - name: SentinelOne
    ats: greenhouse
    token: sentinellabs
  - name: Corelight
    ats: greenhouse
    token: corelight
  - name: Abnormal AI
    ats: greenhouse
    token: abnormalsecurity
  - name: Chainguard
    ats: greenhouse
    token: chainguard

  # --- Big tech / infra with in-house CTI & detection (Amazon-ACTI-like)
  - name: Cloudflare
    ats: greenhouse
    token: cloudflare
  - name: Datadog
    ats: greenhouse
    token: datadog

  # --- Fintech / large enterprises with mature intel teams (BofA-like)
  - name: Coinbase
    ats: greenhouse
    token: coinbase
  - name: Stripe
    ats: greenhouse
    token: stripe
  - name: Plaid
    ats: lever
    token: plaid
  - name: Palantir
    ats: lever
    token: palantir
