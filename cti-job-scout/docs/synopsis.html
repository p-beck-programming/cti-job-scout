<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CTI Job Scout — Market Synopsis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg0:#0a1220; --bg1:#0e1930; --chrome-ink:#e8eef5; --chrome-muted:#93a4bb;
    --glass:rgba(13,22,38,.72); --glass-line:rgba(122,215,247,.16);
    --neon:#7ad7f7;
    --ink:#141a24; --panel:#ffffff; --line:#d4dae1;
    --muted:#5b6673; --accent:#245fa0; --accent-ink:#183f6b;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,Consolas,monospace;
    --sans:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;
    --disp:'Space Grotesk',var(--sans);
  }
  *{box-sizing:border-box}
  body{margin:0;color:var(--chrome-ink);font-family:var(--sans);font-size:15px;line-height:1.55;
    background:radial-gradient(1100px 600px at 15% -10%, #13294a 0%, transparent 55%),
               radial-gradient(900px 500px at 110% 30%, #0f2b3d 0%, transparent 60%),
               var(--bg0)}
  a{color:var(--neon)}
  .wrap{max-width:1060px;margin:0 auto;padding:28px 20px 80px}

  header{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 18px}
  header h1{font-family:var(--disp);font-weight:700;font-size:30px;margin:0;letter-spacing:-.01em;
    color:#fff;text-shadow:0 0 24px rgba(122,215,247,.25)}
  header .sub{font-family:var(--mono);font-size:12.5px;color:var(--chrome-muted);flex-basis:100%;margin-top:2px}
  header .sub b{color:var(--chrome-ink)}
  .nav{display:flex;gap:6px;margin-left:auto}
  .nav a{font-family:var(--mono);font-size:12px;letter-spacing:.07em;text-transform:uppercase;
    color:var(--chrome-muted);text-decoration:none;padding:5px 12px;border:1px solid transparent;border-radius:999px}
  .nav a:hover{color:var(--neon)}
  .nav a.on{color:var(--neon);border-color:var(--glass-line);background:var(--glass)}

  .hero{background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--ink);
    padding:20px 22px;margin:22px 0 16px;box-shadow:0 8px 28px rgba(3,8,18,.45)}
  .hero .label{font-family:var(--mono);font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
  .hero h2{font-family:var(--disp);font-size:21px;font-weight:600;margin:4px 0 8px;color:var(--accent-ink)}
  .hero p{margin:0;font-size:15px;color:#2b3542}
  .hero .facts{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:12px}
  .hero .facts b{color:var(--ink)}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--ink);
    padding:16px 20px;box-shadow:0 8px 28px rgba(3,8,18,.45)}
  .card h3{font-family:var(--mono);font-size:11.5px;letter-spacing:.09em;text-transform:uppercase;
    color:var(--accent);margin:0 0 10px;padding-bottom:8px;border-bottom:1px solid var(--line)}
  .card ul{margin:0;padding:0;list-style:none}
  .card li{font-size:13.8px;color:#2b3542;padding:6px 0 6px 18px;position:relative;border-bottom:1px dotted #e7ebef}
  .card li:last-child{border-bottom:none}
  .card li::before{content:'▸';position:absolute;left:0;top:8px;font-size:12px;color:var(--accent)}

  .companies{font-family:var(--mono);font-size:11.5px;color:var(--chrome-muted);margin:16px 2px 0}
  .companies b{color:var(--chrome-ink)}

  .empty{background:var(--glass);border:1px dashed var(--glass-line);border-radius:10px;
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    padding:36px 20px;text-align:center;color:var(--chrome-muted);margin-top:22px}
  .empty b{color:var(--chrome-ink)}
  .empty code{color:var(--neon)}

  @media (max-width:760px){.grid{grid-template-columns:1fr}.nav{margin-left:0}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Market Synopsis</h1>
    <nav class="nav" aria-label="Site">
      <a href="index.html">Matches</a>
      <a href="synopsis.html" class="on" aria-current="page">Synopsis</a>
      <a href="archive.html">Archive</a>
    </nav>
    <div class="sub" id="meta">loading synopsis…</div>
  </header>

  <main id="content"></main>
</div>

<script src="bg.js"></script>
<script>
(function(){
  const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const meta=document.getElementById('meta'), content=document.getElementById('content');

  const SECTIONS=[
    ['top_skills','Top skills'],
    ['tools_and_technologies','Tools & technologies'],
    ['certifications','Certifications'],
    ['experience','Experience & seniority'],
    ['emerging_trends','Emerging trends'],
    ['soft_skills','Soft skills'],
  ];

  function sectionCard(title,items){
    if(!items||!items.length) return '';
    return '<section class="card"><h3>'+esc(title)+'</h3><ul>'
      +items.map(i=>'<li>'+esc(i)+'</li>').join('')+'</ul></section>';
  }

  function render(entry){
    const when=(entry.generated_at||'').slice(0,10);
    meta.innerHTML='what employers are asking for, distilled from your matched postings · '
      +'refreshed every Monday · current: <b>'+esc(entry.period_label||'')+'</b>';
    content.innerHTML=
      '<article class="hero">'
      +'<div class="label">'+esc(entry.period_label||'')+'</div>'
      +'<h2>What the market wants right now</h2>'
      +'<p>'+esc(entry.overview||'')+'</p>'
      +'<div class="facts">built from <b>'+esc(entry.job_count)+'</b> matched postings · generated <b>'
      +esc(when)+'</b> · '+esc(entry.model||'')+'</div>'
      +'</article>'
      +'<div class="grid">'
      +SECTIONS.map(([key,title])=>sectionCard(title,entry[key])).join('')
      +'</div>'
      +(entry.companies&&entry.companies.length
        ? '<p class="companies"><b>Postings from:</b> '+entry.companies.map(esc).join(' · ')+'</p>'
        : '');
  }

  fetch('synopsis.json',{cache:'no-store'})
    .then(r=>{if(!r.ok)throw new Error(r.status);return r.json()})
    .then(data=>{
      if(!data.current) throw new Error('no current synopsis');
      render(data.current);
    })
    .catch(()=>{
      meta.textContent='could not load synopsis.json';
      content.innerHTML='<div class="empty"><b>synopsis.json not found.</b><br>'
        +'It ships with the repo and is regenerated by the pipeline every Monday. '
        +'Serve this folder over HTTP — e.g. <code>python -m http.server -d docs</code> '
        +'— or publish via GitHub Pages; file:// blocks the data fetch.</div>';
    });
})();
</script>
</body>
</html>
