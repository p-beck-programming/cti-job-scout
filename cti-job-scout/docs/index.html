<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CTI Job Scout — Match Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#141a24; --panel:#ffffff; --paper:#eef1f4; --line:#d4dae1;
    --muted:#5b6673; --accent:#245fa0; --accent-ink:#183f6b;
    --hi:#1a7f37; --mid:#9a6700; --lo:#8a94a0;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,Consolas,monospace;
    --sans:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;
    --disp:'Space Grotesk',var(--sans);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5}
  a{color:var(--accent)}
  .wrap{max-width:1060px;margin:0 auto;padding:28px 20px 80px}

  header h1{font-family:var(--disp);font-weight:700;font-size:30px;margin:0;letter-spacing:-.01em}
  header .sub{font-family:var(--mono);font-size:12.5px;color:var(--muted);margin-top:4px}
  header .sub b{color:var(--ink)}

  .filters{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:16px;margin:22px 0 18px;display:grid;gap:14px;
    grid-template-columns:1.4fr 1fr 1fr auto auto;align-items:end}
  .filters label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  .filters input[type=text],.filters select{width:100%;padding:8px 10px;font:inherit;font-size:14px;
    border:1px solid var(--line);border-radius:6px;background:#fbfcfd;color:var(--ink)}
  .filters input:focus,.filters select:focus,.filters button:focus{outline:2px solid var(--accent);outline-offset:1px}
  .score-ctl{display:flex;align-items:center;gap:8px}
  .score-ctl output{font-family:var(--mono);font-size:14px;font-weight:600;min-width:2.2em;text-align:right}
  .remote-ctl{display:flex;align-items:center;gap:7px;padding-bottom:8px;white-space:nowrap}
  .remote-ctl input{width:16px;height:16px;accent-color:var(--accent)}
  .remote-ctl span{font-size:14px}
  .filters .reset{grid-column:1/-1;justify-self:start;background:none;border:none;color:var(--accent);
    font:inherit;font-size:13px;cursor:pointer;padding:0;text-decoration:underline;display:none}
  .filters .reset.on{display:inline}

  .count{font-family:var(--mono);font-size:12.5px;color:var(--muted);margin:0 2px 10px}

  .job{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    margin-bottom:12px;display:grid;grid-template-columns:56px 1fr;overflow:hidden}
  /* Signature element: the score spine — a vertical fill meter, read like a
     signal-strength gauge on a detection console. */
  .spine{position:relative;background:#f2f5f8;border-right:1px solid var(--line);
    display:flex;align-items:flex-end;justify-content:center}
  .spine .fill{position:absolute;left:0;right:0;bottom:0;opacity:.16}
  .spine .num{position:relative;font-family:var(--mono);font-weight:600;font-size:16px;
    padding-bottom:10px}
  .job[data-band=hi] .fill{background:var(--hi)} .job[data-band=hi] .num{color:var(--hi)}
  .job[data-band=mid] .fill{background:var(--mid)} .job[data-band=mid] .num{color:var(--mid)}
  .job[data-band=lo] .fill{background:var(--lo)} .job[data-band=lo] .num{color:var(--lo)}
  .body{padding:14px 18px 15px}
  .co{font-family:var(--mono);font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .title{font-family:var(--disp);font-size:18.5px;font-weight:600;margin:2px 0 6px}
  .title a{color:var(--accent-ink);text-decoration:none}
  .title a:hover{text-decoration:underline}
  .why{font-size:14px;color:#39434f;margin:0 0 8px}
  .meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .tag{font-family:var(--mono);font-size:11.5px;border:1px solid var(--line);border-radius:4px;
    padding:2px 7px;background:#f7f9fb;color:#3c4652}
  .tag.loc{border-color:#bcd0e4;background:#eef4fa;color:var(--accent-ink)}
  .tag.remote{border-color:#bfe3cd;background:#ecf7f0;color:var(--hi)}
  .kw{font-family:var(--mono);font-size:11.5px;color:#7a5bb5;margin-top:7px}
  .date{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:7px}

  .empty{background:var(--panel);border:1px dashed var(--line);border-radius:10px;
    padding:36px 20px;text-align:center;color:var(--muted)}
  .empty b{color:var(--ink)}

  @media (max-width:720px){
    .filters{grid-template-columns:1fr 1fr}
    .filters .search{grid-column:1/-1}
  }
  @media (prefers-reduced-motion:no-preference){
    .job{transition:border-color .15s}
    .job:hover{border-color:#b3bfcc}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>CTI Job Scout</h1>
    <div class="sub" id="meta">loading feed…</div>
  </header>

  <section class="filters" aria-label="Filters">
    <div class="search">
      <label for="q">Search</label>
      <input type="text" id="q" placeholder="title, company, keyword…">
    </div>
    <div>
      <label for="metro">City / metro</label>
      <select id="metro"><option value="">All metros</option></select>
    </div>
    <div>
      <label for="state">State</label>
      <select id="state"><option value="">All states</option></select>
    </div>
    <div>
      <label for="minscore">Min score</label>
      <div class="score-ctl">
        <input type="range" id="minscore" min="0" max="100" step="5" value="60">
        <output for="minscore" id="scoreout">60</output>
      </div>
    </div>
    <div class="remote-ctl">
      <input type="checkbox" id="remote"><span><label for="remote" style="all:unset;cursor:pointer">Remote only</label></span>
    </div>
    <button class="reset" id="reset">Clear all filters</button>
  </section>

  <p class="count" id="count"></p>
  <main id="list"></main>
</div>

<script>
(function(){
  const $=id=>document.getElementById(id);
  const els={q:$('q'),metro:$('metro'),state:$('state'),min:$('minscore'),
             out:$('scoreout'),remote:$('remote'),list:$('list'),
             count:$('count'),meta:$('meta'),reset:$('reset')};
  let jobs=[];

  const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const band=s=>s>=85?'hi':s>=70?'mid':'lo';

  function options(select,values){
    values.sort((a,b)=>a.localeCompare(b)).forEach(v=>{
      const o=document.createElement('option');o.value=v;o.textContent=v;select.appendChild(o);
    });
  }

  function locLabel(l){return l.metro||l.city||null}

  function render(){
    const q=els.q.value.trim().toLowerCase(),
          metro=els.metro.value, state=els.state.value,
          min=+els.min.value, remoteOnly=els.remote.checked;
    els.out.textContent=min;
    els.reset.classList.toggle('on', q||metro||state||remoteOnly||min!==60);

    const shown=jobs.filter(j=>{
      if(j.score<min) return false;
      if(remoteOnly && !j.locations.some(l=>l.remote)) return false;
      if(metro && !j.locations.some(l=>locLabel(l)===metro)) return false;
      if(state && !j.locations.some(l=>l.state===state)) return false;
      if(q){
        const hay=(j.title+' '+j.company+' '+j.rationale+' '+j.keywords.join(' ')+' '
          +j.locations.map(l=>l.display).join(' ')).toLowerCase();
        if(!hay.includes(q)) return false;
      }
      return true;
    });

    els.count.textContent=shown.length+' of '+jobs.length+' matches shown';
    if(!shown.length){
      els.list.innerHTML='<div class="empty"><b>No matches under these filters.</b><br>Loosen a filter or lower the minimum score.</div>';
      return;
    }
    els.list.innerHTML=shown.map(j=>{
      const locTags=j.locations.map(l=>
        l.remote&&!l.city?'<span class="tag remote">Remote'+(l.country?' ('+esc(l.country)+')':'')+'</span>'
        :'<span class="tag loc">'+esc(l.display)+'</span>').join('');
      const kw=j.keywords.length?'<div class="kw">matched: '+j.keywords.slice(0,8).map(esc).join(', ')+'</div>':'';
      return '<article class="job" data-band="'+band(j.score)+'">'
        +'<div class="spine" aria-label="score '+j.score+' of 100">'
        +'<div class="fill" style="height:'+j.score+'%"></div>'
        +'<div class="num">'+j.score+'</div></div>'
        +'<div class="body">'
        +'<div class="co">'+esc(j.company)+'</div>'
        +'<h2 class="title"><a href="'+esc(j.url)+'" target="_blank" rel="noopener">'+esc(j.title)+'</a></h2>'
        +'<p class="why">'+esc(j.rationale)+'</p>'
        +'<div class="meta">'+locTags+'</div>'+kw
        +'<div class="date">scored '+esc((j.scored_at||'').slice(0,10))+'</div>'
        +'</div></article>';
    }).join('');
  }

  function init(data){
    jobs=data.jobs||[];
    const metros=new Set(), states=new Set();
    jobs.forEach(j=>j.locations.forEach(l=>{
      const m=locLabel(l); if(m) metros.add(m);
      if(l.state) states.add(l.state);
    }));
    options(els.metro,[...metros]); options(els.state,[...states]);
    const when=(data.generated_at||'').replace('T',' ').slice(0,16);
    els.meta.innerHTML='<b>'+jobs.length+'</b> scored matches on file · feed updated <b>'+esc(when)+'</b> UTC';
    ['input','change'].forEach(ev=>{
      [els.q,els.metro,els.state,els.min,els.remote].forEach(el=>el.addEventListener(ev,render));
    });
    els.reset.addEventListener('click',()=>{
      els.q.value='';els.metro.value='';els.state.value='';els.min.value=60;els.remote.checked=false;render();
    });
    render();
  }

  fetch('jobs.json',{cache:'no-store'})
    .then(r=>{if(!r.ok)throw new Error(r.status);return r.json()})
    .then(init)
    .catch(()=>{
      els.meta.textContent='could not load jobs.json';
      els.list.innerHTML='<div class="empty"><b>jobs.json not found.</b><br>'
        +'Run the pipeline once to generate it, then serve this folder — e.g. '
        +'<code>python -m http.server -d docs</code> — or publish via GitHub Pages. '
        +'Opening this file directly with file:// blocks the data fetch in most browsers.</div>';
    });
})();
</script>
</body>
</html>
